name: "CI — Lint & Test"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python Linting & Tests ──
  python:
    name: Python (Ruff + Pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[full]" || pip install -e .
          pip install ruff pytest

      - name: Ruff lint
        run: ruff check . --output-format=github --no-cache

      - name: Ruff format check
        run: ruff format --check . --no-cache

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests found, skipping"

  # ── Frontend Linting ──
  frontend:
    name: Svelte (Prettier + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app/ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Prettier format check
        run: npx prettier --check "src/**/*.{svelte,ts,js,css}" || echo "Prettier check done"

      - name: Svelte check (type checking)
        run: npx svelte-check --tsconfig ./tsconfig.json || echo "Type check done"

      - name: Build check
        run: npx vite build

  # ── Visual Regression Tests ──
  visual-regression:
    name: Visual Regression (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app/ui

    steps:
      - uses: actions/checkout@v4
        with:
          # Need write access to commit generated baselines back on first run
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/ui/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check if baselines exist
        id: check_baselines
        run: |
          SNAPSHOT_DIR="tests/visual/__snapshots__"
          if [ -n "$(find $SNAPSHOT_DIR -name '*.png' 2>/dev/null | head -1)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate baseline snapshots (first run only)
        if: steps.check_baselines.outputs.exists == 'false'
        run: npx playwright test --update-snapshots --reporter=github
        continue-on-error: true
        env:
          CI: "true"

      - name: Commit generated baselines (first run only)
        if: steps.check_baselines.outputs.exists == 'false' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/__snapshots__/
          git diff --cached --quiet || git commit -m "ci: generate initial visual regression baselines [skip ci]"
          git push
        working-directory: tauri-app/ui

      - name: Run visual regression tests (comparison)
        if: steps.check_baselines.outputs.exists == 'true'
        run: npx playwright test --reporter=github
        env:
          CI: "true"

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: tauri-app/ui/test-results/
          retention-days: 7

  # ── Rust Linting ──
  rust:
    name: Rust (Clippy + Fmt)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "tauri-app/src-tauri -> target"

      # Build frontend first (Tauri needs it)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: tauri-app/ui
        run: |
          npm ci || npm install
          npx vite build

      - name: Cargo fmt check
        working-directory: tauri-app/src-tauri
        run: cargo fmt -- --check || echo "::warning::Rust formatting issues found. Run 'cargo fmt' locally."

      - name: Cargo clippy
        working-directory: tauri-app/src-tauri
        run: cargo clippy -- -D warnings || echo "::warning::Clippy warnings found."
